<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 30px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>{{ user['name'] }}'s Portfolio</h2>

    <p>{{ user['bio'] }}</p>

    <a href="{{ user['github'] }}" target="_blank">GitHub</a><br>
    <a href="{{ user['linkedin'] }}" target="_blank">LinkedIn</a>

    <h3>Projects</h3>

    {% for p in portfolios %}
        <div class="card">
            <h3>{{ p['title'] }}</h3>
            <p>{{ p['description'] }}</p>
            <p><b>Skills:</b> {{ p['skills'] }}</p>
        </div>
    {% endfor %}

</div>

</body>
</html>
